<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم طلب إجازة</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>تقديم طلب إجازة</h1>
                <p>يرجى تعبئة النموذج أدناه</p>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="theme-toggle" aria-label="تغيير المظهر">
                    <i class="ph ph-moon"></i>
                </button>
            </div>
        </header>

        <main class="form-wrapper">
            <form id="whatsapp-form" class="dynamic-form" novalidate>
                <div id="form-fields-container"></div>

                <button type="submit" class="submit-btn">
                    <i class="ph ph-paper-plane-right"></i>
                    <span>إرسال</span>
                </button>
            </form>
        </main>
    </div>


    <!-- Preview Modal -->
    <div id="preview-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>معاينة البيانات</h2>
                <button id="close-modal" class="close-btn"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body" id="preview-container">
            </div>
            <div class="modal-footer">
                <button id="cancel-btn" class="action-btn secondary-btn">رجوع للتعديل</button>
                <button id="send-btn" class="action-btn send-btn">
                    <i class="ph ph-paper-plane-right"></i>
                    <span>إرسال</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <p>جاري إنشاء الإجازة وإرسالها...</p>
        </div>
    </div>

    <!-- Success message overlay -->
    <div id="success-overlay" class="loading-overlay">
        <div class="success-message show">
            <div class="success-icon">
                <i class="ph ph-check-circle"></i>
            </div>
            <h3>تم الإرسال بنجاح!</h3>
            <p>تم إرسال طلب الإجازة إلى الإدارة وسوف يتم التواصل معك عند الموافقة</p>
            <div class="success-actions">
                <button id="reset-btn" class="action-btn parse-btn">
                    <i class="ph ph-arrow-counter-clockwise"></i>
                    <span>تعبئة نموذج آخر</span>
                </button>
            </div>
        </div>
    </div>

    <script src="telegram-config.js"></script>
    <script src="app.js"></script>

</body>

</html>
